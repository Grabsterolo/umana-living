---
layout: default
---
{% assign s = site.data.site %}
<article class="article-page">
  {% if page.image %}
  <div class="article-page-cover-wrap">
    <img class="article-page-cover" src="{{ page.image | relative_url }}" alt="{{ page.title | escape }}">
  </div>
  {% endif %}
  <div class="article-page-inner">
    <a class="article-back" href="{{ '/' | relative_url }}#blog">← Volver al blog</a>
    <p class="read-cat">{{ page.cat | default: 'Artículo' }}</p>
    <h1 class="read-title">{{ page.title }}</h1>
    <p class="read-meta">{% if page.author %}{{ page.author }} · {% endif %}{{ page.date | date: "%d/%m/%Y" }}</p>
    <div class="post-content">{{ content }}</div>
  </div>
</article>
