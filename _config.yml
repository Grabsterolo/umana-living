title: Umana Living
description: Ecosistema de acompañamiento emocional y terapéutico en Costa Rica.
# GitHub Pages (proyecto): https://aristizabal95.github.io/umana-living/
url: "https://aristizabal95.github.io"
baseurl: "/umana-living"
lang: es

markdown: kramdown
highlighter: rouge
permalink: pretty

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - cloudcannon.config.yml

collections:
  articulos:
    output: true
    permalink: /articulos/:name/

defaults:
  - scope:
      path: ""
      type: articulos
    values:
      layout: article
